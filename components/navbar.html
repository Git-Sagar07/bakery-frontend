<header class="nav-header">
  <!-- LOGO -->
  <div class="nav-logo">
    <a href="/index.html" class="logo-link">
      <img src="/assets/images/bakery_logo.jpg" alt="My Bakery Logo"
        onerror="this.src='https://ui-avatars.com/api/?name=MB&background=d35400&color=fff&size=44&bold=true&rounded=true'" />
      <span>My Bakery</span>
    </a>
  </div>

  <!-- MAIN MENU LINKS -->
  <nav class="nav-menu" id="navMenu">
    <a href="/index.html">Home</a>
    <a href="/pages/menu.html">Menu</a>
    <a href="/pages/about.html">About</a>
    <a href="/pages/contact.html">Contact</a>
    <a href="/pages/cart.html" class="nav-cart-link">
      🛒 Cart
      <span class="nav-cart-badge" id="nav-cart-badge" style="display:none;">0</span>
    </a>
    <!-- Mobile-only auth zone (injected by JS below) -->
    <div class="nav-mobile-auth" id="navMobileAuth"></div>
  </nav>

  <!-- AUTH LINKS (desktop) -->
  <div id="auth-links" style="display:flex; gap:10px; align-items:center;">
    <a href="/pages/login.html" class="btn-outline">Login</a>
    <a href="/pages/signup.html" class="btn-solid">Sign Up</a>
  </div>

  <!-- USER LINKS (desktop, shown when logged in) -->
  <div id="user-info" style="display: none; gap:10px; align-items:center;"></div>

  <!-- HAMBURGER -->
  <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</header>

<script>
(function() {
  var hamburger = document.getElementById('navHamburger');
  var menu      = document.getElementById('navMenu');

  hamburger.addEventListener('click', function() {
    var isOpen = menu.classList.toggle('open');
    this.classList.toggle('open', isOpen);

    // On mobile: inject auth/user links into the dropdown
    var mobileAuth  = document.getElementById('navMobileAuth');
    var authLinks   = document.getElementById('auth-links');
    var userInfo    = document.getElementById('user-info');

    if (isOpen && mobileAuth) {
      if (userInfo && userInfo.children.length > 0) {
        mobileAuth.innerHTML = userInfo.innerHTML;
      } else if (authLinks && authLinks.children.length > 0) {
        mobileAuth.innerHTML = authLinks.innerHTML;
      }
      mobileAuth.style.display = 'flex';
    } else if (mobileAuth) {
      mobileAuth.style.display = 'none';
    }
  });

  // Close menu when a link is clicked
  menu.addEventListener('click', function(e) {
    if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') {
      menu.classList.remove('open');
      hamburger.classList.remove('open');
    }
  });
})();
</script>
