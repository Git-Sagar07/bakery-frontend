<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - My Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body data-page="auth">

  <div id="navbar-container"></div>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-card">
        <h1>Join Us! 🎉</h1>
        <p class="auth-subtitle">Create your bakery account</p>

        <form class="auth-form" onsubmit="event.preventDefault(); signup();">
          <div class="form-group">
            <label for="signupName">Full Name *</label>
            <input type="text" id="signupName" placeholder="Enter your full name" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email Address *</label>
            <input type="email" id="signupEmail" placeholder="your.email@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="signupPhone">Phone Number <span style="color:#999;font-weight:400;">(optional)</span></label>
            <input type="tel" id="signupPhone" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password *</label>
            <div class="password-wrap">
              <input type="password" id="signupPassword" placeholder="Create a strong password (min 6 chars)" required autocomplete="new-password" />
              <button type="button" class="toggle-pwd" onclick="togglePwd('signupPassword', this)" aria-label="Show password">👁</button>
            </div>
            <span id="pwdStrength" class="pwd-strength-label"></span>
            <div class="pwd-requirements">
              Password must have: <strong>8+ chars</strong>, <strong>1 uppercase</strong>, <strong>1 number</strong>, <strong>1 special char</strong> (!@#$%^&*)
            </div>
          </div>
          <div class="form-group">
            <label for="signupConfirmPassword">Confirm Password *</label>
            <div class="password-wrap">
              <input type="password" id="signupConfirmPassword" placeholder="Re-enter your password" required autocomplete="new-password" />
              <button type="button" class="toggle-pwd" onclick="togglePwd('signupConfirmPassword', this)" aria-label="Show password">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-auth">Sign Up 🚀</button>
        </form>

        <p class="auth-footer">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>
  </section>

  <script src="../js/api.js"></script>
  <script src="../js/authHelper.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/component.js"></script>
  <script>
    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === "password" ? "text" : "password";
      btn.textContent = inp.type === "password" ? "👁" : "🙈";
    }
  </script>
</body>
</html>
