<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - My Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body data-page="auth">

  <div id="navbar-container"></div>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-card">
        <div style="font-size:3rem;margin-bottom:10px;">🔑</div>
        <h1>Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

        <form class="auth-form" onsubmit="event.preventDefault(); forgotPassword();">
          <div class="form-group">
            <label for="forgotEmail">Registered Email Address</label>
            <input type="email" id="forgotEmail" placeholder="your.email@example.com" required autocomplete="email" />
          </div>
          <button type="submit" class="btn-auth">Send Reset Link 📧</button>
        </form>

        <p class="auth-footer" style="margin-top:20px;">
          Remembered it?
          <a href="login.html">Back to Login</a>
        </p>

        <div class="demo-note" style="margin-top:20px;padding:12px 16px;background:#fff8e1;border-radius:10px;font-size:0.85rem;color:#856404;border:1px solid #ffc107;">
          <strong>⚠️ Demo Mode:</strong> Since there's no backend yet, your temporary password will appear on screen after a moment. Connect a real email service (e.g. SendGrid, Firebase Auth) after backend integration.
        </div>
      </div>
    </div>
  </section>

  <script src="../js/api.js"></script>
  <script src="../js/authHelper.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/component.js"></script>
</body>
</html>
