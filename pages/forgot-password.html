<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – My Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body data-page="auth">

  <div id="navbar-container"></div>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-card">

        <!-- FORM STATE -->
        <div id="formState">
          <div style="font-size:3rem;margin-bottom:10px;">🔑</div>
          <h1>Forgot Password?</h1>
          <p class="auth-subtitle">Enter your email and we'll send you a reset link valid for 15 minutes</p>

          <form class="auth-form" onsubmit="event.preventDefault(); sendResetLink();">
            <div class="form-group">
              <label for="forgotEmail">Registered Email Address</label>
              <input type="email" id="forgotEmail" placeholder="your.email@example.com"
                required autocomplete="email" />
            </div>
            <button type="submit" class="btn-auth" id="sendBtn">Send Reset Link 📧</button>
          </form>

          <p class="auth-footer" style="margin-top:20px;">
            Remembered it? <a href="login.html">Back to Login</a>
          </p>
        </div>

        <!-- SUCCESS STATE (shown after email sent) -->
        <div id="successState" style="display:none;text-align:center;">
          <div style="font-size:3.5rem;margin-bottom:14px;">📬</div>
          <h1>Check Your Inbox!</h1>
          <p class="auth-subtitle">
            If <strong id="sentToEmail"></strong> is registered with us,
            a password reset link has been sent. Check your spam folder too.
          </p>
          <p style="color:#aaa;font-size:0.83rem;margin-top:10px;">Link expires in 15 minutes.</p>
          <a href="login.html" class="btn-auth"
            style="display:inline-block;margin-top:20px;text-decoration:none;text-align:center;">
            Back to Login →
          </a>
          <p style="margin-top:14px;">
            <button onclick="showFormAgain()"
              style="background:none;border:none;color:#d35400;font-size:0.88rem;cursor:pointer;font-family:Poppins,sans-serif;font-weight:600;">
              Didn't receive it? Try again
            </button>
          </p>
        </div>

      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/authHelper.js"></script>
  <script src="../js/component.js"></script>
  <script>
    async function sendResetLink() {
      const email = document.getElementById("forgotEmail").value.trim();
      const btn   = document.getElementById("sendBtn");

      if (!email) { showMsg("❌ Please enter your email address."); return; }

      btn.disabled    = true;
      btn.textContent = "Sending...";

      const res = await api.post("/auth/forgot-password", { email });

      btn.disabled    = false;
      btn.textContent = "Send Reset Link 📧";

      if (res && res.success) {
        // Show success state regardless (don't reveal if email exists)
        document.getElementById("sentToEmail").textContent = email;
        document.getElementById("formState").style.display    = "none";
        document.getElementById("successState").style.display = "block";
      } else {
        showMsg("❌ " + (res?.message || "Something went wrong. Please try again."));
      }
    }

    function showFormAgain() {
      document.getElementById("formState").style.display    = "block";
      document.getElementById("successState").style.display = "none";
    }

    function showMsg(text) {
      let el = document.getElementById("authMsg");
      if (!el) {
        el = document.createElement("p");
        el.id = "authMsg";
        el.style.cssText = "margin-top:12px;padding:10px 16px;border-radius:10px;font-size:0.88rem;font-weight:600;background:#fff0f0;color:#d32f2f;";
        document.querySelector(".auth-form")?.appendChild(el);
      }
      el.textContent = text;
    }
  </script>
</body>
</html>
