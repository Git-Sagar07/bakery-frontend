<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Placed! – My Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <style>
    .success-section {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fffaf5;
      padding: 60px 5%;
    }
    .success-card {
      background: white;
      border-radius: 24px;
      padding: 52px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(211, 84, 0, 0.12);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .success-icon {
      font-size: 5rem;
      margin-bottom: 16px;
      animation: bounce 0.6s ease 0.3s both;
    }
    @keyframes bounce {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .success-card h1 {
      font-size: 2rem;
      color: #222;
      margin: 0 0 10px;
    }
    .success-card p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0 0 12px;
    }
    .order-id-badge {
      display: inline-block;
      background: #fff3e8;
      border: 2px solid #ffd7c2;
      border-radius: 12px;
      padding: 10px 20px;
      margin: 16px 0;
    }
    .order-id-badge small {
      display: block;
      color: #aaa;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .order-id-badge strong {
      font-size: 1.5rem;
      color: #d35400;
      letter-spacing: 2px;
    }
    .payment-badge {
      display: inline-block;
      background: #f0fff4;
      border: 1px solid #b7ebc7;
      color: #27ae60;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .eta-box {
      background: #fff8f3;
      border-radius: 12px;
      padding: 14px 20px;
      margin: 16px 0 24px;
      color: #d35400;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      padding: 12px 28px;
      background: linear-gradient(135deg, #d35400, #e67e22);
      color: white;
      border: none;
      border-radius: 30px;
      font-family: "Poppins", sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 16px rgba(211,84,0,0.3);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(211,84,0,0.4); }
    .btn-secondary {
      padding: 12px 28px;
      background: white;
      color: #d35400;
      border: 2px solid #ffd7c2;
      border-radius: 30px;
      font-family: "Poppins", sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.25s ease;
    }
    .btn-secondary:hover { background: #fff3e8; border-color: #d35400; }
    .email-note {
      margin-top: 20px;
      color: #aaa;
      font-size: 0.78rem;
    }
    @media (max-width: 480px) {
      .success-card { padding: 36px 24px; }
      .success-card h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <section class="success-section">
    <div class="success-card">
      <div class="success-icon">🎉</div>
      <h1>Order Placed!</h1>
      <p>Thank you! Your delicious treats are being prepared with love 🧁</p>

      <div class="order-id-badge">
        <small>Order ID</small>
        <strong id="displayOrderId">Loading...</strong>
      </div>

      <div id="paymentBadge" class="payment-badge" style="display:none;"></div>

      <div class="eta-box">⏱️ Estimated Delivery: 30–45 minutes</div>

      <div class="action-buttons">
        <a href="profile.html?tab=orders" class="btn-primary">📦 Track Order</a>
        <a href="menu.html" class="btn-secondary">🛍️ Shop More</a>
      </div>

      <p class="email-note">📧 A confirmation email has been sent to your registered email address.</p>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/authHelper.js"></script>
  <script src="../js/component.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const orderId   = sessionStorage.getItem("lastOrderId");
      const method    = sessionStorage.getItem("lastOrderMethod");
      const paymentId = sessionStorage.getItem("lastPaymentId");

      if (!orderId) {
        // No order in session — redirect home
        window.location.href = "/index.html";
        return;
      }

      document.getElementById("displayOrderId").textContent = orderId;

      const badge = document.getElementById("paymentBadge");
      if (method === "online" && paymentId) {
        badge.textContent    = `✅ Paid Online · ${paymentId.slice(-8).toUpperCase()}`;
        badge.style.display  = "inline-block";
      } else if (method === "cod") {
        badge.textContent    = "💵 Cash on Delivery";
        badge.style.background = "#fffbea";
        badge.style.border   = "1px solid #ffe082";
        badge.style.color    = "#b7860b";
        badge.style.display  = "inline-block";
      }

      // Clear session so refresh doesn't re-show
      sessionStorage.removeItem("lastOrderId");
      sessionStorage.removeItem("lastOrderMethod");
      sessionStorage.removeItem("lastPaymentId");
    });
  </script>
</body>
</html>
